<!--Home Site.-->
<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Seedのホームページ</title>
        <meta property="og:title" content="@seed_scriptのホームページ">
        <style>
            html{
                scroll-behavior: smooth;
                height:100%;
            }
            body{
                height:100%;
                display:flex;
                flex-direction: column;
                min-height: 100vh;
                position:relative;
                margin:0;
                padding-top: 60px;
            }
            header{
                position: fixed;
                background-color: #404040;
                width: 100%;
                height: 60px;
                top:0px;
                left:0px;
            }
            footer{
                background-color: #888888;
                width: 100%;
                height: 60px;
                left:0px;
                bottom:0;
                left:0;
                margin:0;
            }
            #header_p_1{
                position: absolute;
                color:white;
                top:-4px;
                left:16px;
                font-size:20px;
                text-decoration: none;
            }
            #header_p_1:hover{
                text-decoration: underline;
                cursor:pointer;
            }
            #header_p_2{
                position:absolute;
                color:white;
                top:0px;
                left:128px;
                text-decoration: none;
            }
            #header_p_2:hover{
                text-decoration: underline;
                cursor:pointer;
            }
            #bmain{
                flex:1
            }
            .p_autoNewline_false{
                white-space: nowrap;
            }
        </style>
    </head>
    <body>
        <header>
            <span class="p_autoNewline_false">
                <p id="header_p_1" title="このページはトップページです" onclick="javascript:func('header_p_1')" style="color:gold">Seed HP</p>
                <p id="header_p_2" title="ブログへ移動します" onclick="javascript:func('header_p_2')">Blog</p>
            </span>
        </header>
        <div id="bmain">
        <h1>Seed.Script</h1>
        <h2>その他の機能は開発中です(サボるな仕事しろ早く作れ)</h2>
        <h3>Blogはある程度作ってます。ぜひご覧ください</h3>
        </div>
        <footer>
            <p>aaa</p>
            <p>bbb</p>
        </footer>
    </body>
    <script>
        const Self=globalThis.location.origin+"/seedhp/"
        const sites={
            "home":"",
            "blog":"article/blog",

        }
        function func(document_id){
            const obj=document.getElementById(document_id)
            if (document_id==="header_p_1"){
                window.scrollTo({top:0,left:0,behavior:"smooth"})
                return 0
            }else if (document_id==="header_p_2"){
                location.href=(Self+sites.blog+"?from=home&jumpfrom=site")
            }
        }
    </script>
</html>
