    <script>
        /*
        Result Code Rules(hex)
        0x saaabbbb cccccccc
        s:CheckSum(0~7:ok,8~f:ng)
        a:FunctionID
        b:Function_SIKIBETU_ID
        c:ResultID
        */
        const home=location.origin+"/seedhp/"
        const thisPath="article/bloglist/"
        function func(cmd,...parametor){//FunctionID:000
            if (cmd==="screen_scroll"){//sikibetuID:0000
                try{
                    const moveToX=parametor[0]
                    const moveToY=parametor[1]
                    window.scrollTo({top:moveToX,left:moveToY,behavior:"smooth"})
                    return 0x0000000000000000n
                }catch(e){
                    return 0x8000000000000000n
                }
            }else if (cmd==="null::url"){//sikibetuID:0001
                try{
                    /**@type {string}*/
                    const aurl=parametor[0]
                    if (aurl.startsWith("http://")||aurl.startsWith("https://")){
                        location.href=aurl
                        return 0x0000000100000000n
                    }else if (aurl.startsWith("/")){
                        location.href=home+aurl.slice(1)
                        return 0x0000000100000001n
                    }else{
                        location.href=home+thisPath+aurl
                        return 0x0000000100000002n
                    }
                }catch(e){
                    return 0x8000000100000000n
                }
            }
        }
    </script>

        async function listsort(isCreate=false){//FunctionID:001
            /**@type {HTMLSelectElement}*/
            const sl=document.getElementById("div1_select1")
            const d=new Date()
            await new Promise((resolve,reject)=>{
                sl.disabled=true
                if (isCreate){
                    article_s0=structuredClone(article)
                    article_s1=structuredClone(article)

                    for (let i=0;i<using.length;i++){

                        /**@type {number}*/
                        const time=using[i][1]
                        /**@type {string}*/

                        const tdtime=document.createElement("td")

                        const tdtime_span=document.createElement("span")

                        tdtime_span.textContent=new Date(time).toLocaleString()
                        tdtime_span.title=tdtime_span.textContent+" に編集されました"

                        tdname.appendChild(tdname_span)
                        tdtime.appendChild(tdtime_span)
                        tr.appendChild(tdname)
                        tr.appendChild(tdtime)
