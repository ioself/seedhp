            .urlList{

            .urlList:hover{

            }

        }
        const Self=globalThis.location.origin+"/seedhp/"
        const sites={
            "home":"",
            "blog":"article/blog"
        }
        const pr=new URLSearchParams(location.search)
        //[[Name,Url,UnixTime,Hovermsg]...]
        let article
        !async function(){
            if (pr.get("debug")=="1"){
                article=[
                    ["Test1","article/blog/00000000.html",1780034274014,"デバッグ用1"],
                    ["Test2","article/blog/00000001.html",1780034274019,"デバッグ用2"],
                    ["Test3","https://google.com:443",18319842,"(Google)"]
                ]
            }else{
                article=await fetch("https://ioself.github.io/seedhp/blog_article.json").then(v=>v.json())
            }
            //huruijun
            globalThis.article_s0=[]
            //atarasiijun
            globalThis.article_s1=[]
            /**@param {string} document_id@param {string|undefined} p1,p2*/
            function func(document_id,p1=undefined,p2=undefined){
                const obj=document.getElementById(document_id)
                if (document_id==="header_p_1"){
                    location.href=Self+sites.home
                    return 0
                }else if (document_id==="header_p_2"){
                    window.scrollTo({top:0,left:0,behavior:"smooth"})
                    return 0
                }else if (document_id==="null::url"){
                    if (p1.startsWith("http://")||p1.startsWith("https://")){
                        location.href=p1
                        return 0
                    }else if (p1.startsWith("/")){
                        location.href=Self+p1.slice(1)
                    }else{
                        location.href=Self+sites.blog+"/"+p1
                    }
                }
            }
            async function listsort(isCreate=false){
                /**@type {HTMLSelectElement}*/
                const s=document.getElementById("bmain_sort")
                const d=new Date()
                await new Promise((resolve,reject)=>{
                    s.disabled=true
                    if (isCreate){
                        article_s0=structuredClone(article)
                        article_s0.sort((a,b)=>b[2]-a[2])
                        article_s1=structuredClone(article)
                        article_s1.sort((a,b)=>a[2]-b[2])
                    }else{
                    /**@type {Array<Array<string|number>>}*/
                        const using=globalThis["article_s"+s.value]
                        /**@type {HTMLDivElement}*/
                        const b=document.getElementById("bmain_urllist")
                        b.innerHTML=""
                        let i=0
                        for (const [name,url,time,hovermsg=""] of using){
                            const e=document.createElement("p")
                            e.classList.add("urlList")
                            e.textContent=name
                            e.onclick=function(){func("null::url",url)}
                            e.style.top=(16+i*24)+"px"
                            e.style.left="5%"
                            e.title=hovermsg
                            b.appendChild(e)

                            const f=document.createElement("p")
                            f.classList.add("urlList")
                            f.textContent=new Date(time).toLocaleString()
                            f.style.top=(16+i*24)+"px"
                            f.style.left="60%"
                            f.title=f.textContent+"に公開された記事"
                            b.appendChild(f)

                            if (d.getTime()-time<1209600000/*14 Days*/){
                                const g=document.createElement("img")
                                g.classList.add("urlList")
                                g.src=imgs_list.new_icon
                                g.style.width="36px"
                                g.style.height="auto"
                                g.style.top=(36+i*24)+"px"
                                g.style.left="80%"
                                g.title="14日以内に公開されている記事"
                                b.appendChild(g)
                            }
                            i++
                        }
                    }
                    resolve()
                })
                s.disabled=false
            }
            listsort(true)
            listsort(false)
            globalThis.listsort=listsort
            globalThis.func=func
        }()
